<!-- doctype, head, body 은 국룰-->
<!doctype html>
<html>
  <head>
    <!-- title은 위에 탭의 제목을 바꿔준다
    meta는 메타 데이터 
    이 두줄은 본문을 설명한다-->
    <title>최정우국 국법</title>
    <meta charset="utf-8">
  </head>
  <body>
    <h1><a href="index.html">최정우국 국법</a></h1>
    <ul><!-- ol 은 숫자를 자동으로 해준다 ordered list-->
      <li><a href="1.html">1조</a></li>
      <li><a href="2.html">2조</a></li>
      <li><a href="3.html">3조</a></li>
    </ul>
    
    <h2>2조 자살 방지법</h2>
    <p><strong>최정우국의 <u>모든</u> 주요인사</strong>들은 신변에 문제가 생기면 국가의 지정된 장소에서 생활해야한다<p>
    <!-- img는 블락 태그 unsplash에  좋은사진자료들 많음-->
    <p style="margin-top:45px;"> <img src="prison.jpg" style="float:left;width:30%">효력은 선고즉시 발효된다.</p>
    
  </body>
</html>
